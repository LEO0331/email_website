name: Deploy

on:
  push:
    branches:
      - main
      - master

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install backend dependencies
        run: npm install

      - name: Install client dependencies
        run: npm install --prefix client --legacy-peer-deps

      - name: Run security audit (backend)
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Run security audit (client)
        run: npm audit --prefix client --audit-level=moderate
        continue-on-error: true

      - name: Run client tests
        run: npm test --prefix client -- --coverage --watchAll=false
        continue-on-error: true

      - name: Build client
        run: npm run build --prefix client

      - name: Verify build output
        run: |
          if [ ! -d "client/build" ]; then
            echo "Build failed: client/build directory not found"
            exit 1
          fi

  deploy:
    needs: test-and-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install && npm install --prefix client --legacy-peer-deps

      - name: Build client
        run: npm run build --prefix client

      - name: Deploy to Heroku
        uses: akhileshns/heroku-deploy@v3.12.12
        with:
          heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
          heroku_app_name: ${{ secrets.HEROKU_APP_NAME }}
          heroku_email: ${{ secrets.HEROKU_EMAIL }}
          buildpack: "heroku/nodejs"
        env:
          HD_RETRY_ATTEMPTS: 3
